<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 24px; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #6366f1; }

    button.add-btn {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.add-btn:hover { background: #4f46e5; }

    ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      border-radius: 8px;
      padding: 10px 14px;
      transition: opacity 0.2s;
    }

    li.done { opacity: 0.5; }
    li.done .todo-text { text-decoration: line-through; }

    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #6366f1; }

    .todo-text { flex: 1; font-size: 0.95rem; color: #374151; }

    button.del-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.1rem;
      cursor: pointer;
      transition: color 0.2s;
      padding: 2px 6px;
      border-radius: 4px;
    }
    button.del-btn:hover { color: #ef4444; }

    .empty { text-align: center; color: #94a3b8; padding: 24px 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 I miei task</h1>
    <div class="input-row">
      <input type="text" id="newTodo" placeholder="Aggiungi un'attività..." />
      <button class="add-btn" onclick="addTodo()">Aggiungi</button>
    </div>
    <ul id="list"></ul>
    <p class="empty" id="empty" style="display:none">Niente da fare! 🎉</p>
  </div>

  <script>
    const API = '/api/todos';

    async function fetchTodos() {
      const res = await fetch(API);
      const todos = await res.json();
      render(todos);
    }

    function render(todos) {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      list.innerHTML = '';

      if (todos.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      todos.forEach(todo => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');

        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''}
            onchange="toggleDone('${todo.id}', this.checked)" />
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="del-btn" onclick="deleteTodo('${todo.id}')">✕</button>
        `;
        list.appendChild(li);
      });
    }

    async function addTodo() {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (!text) return;
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      fetchTodos();
    }

    async function toggleDone(id, done) {
      await fetch(`${API}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done })
      });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      fetchTodos();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Aggiungi con Enter
    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
